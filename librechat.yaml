version: 1.3.11
cache: true

interface:
  endpointsMenu: false
  modelSelect: false
  parameters: false
  presets: false
  prompts: false
  bookmarks: false
  webSearch: true
  fileSearch: true
  agents: true

fileConfig:
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 20
      totalSizeLimit: 50
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"

endpoints:
  custom:
    - name: "Claude"
      apiKey: "${CLAUDE_API_KEY}"
      baseURL: "${CLAUDE_API_URL}/v1"
      models:
        default: ["claude-sonnet-4-6", "claude-opus-4-7"]
        fetch: false
      titleConvo: true
      titleModel: "claude-sonnet-4-6"
      modelDisplayLabel: "Claude"
      maxContextTokens: 200000
    - name: "GPT"
      apiKey: "${GPT_API_KEY}"
      baseURL: "${GPT_API_URL}"
      models:
        default:
          - gpt-5.4
        fetch: false
      titleConvo: true
      titleModel: "gpt-5.4"
      modelDisplayLabel: "GPT"
      maxContextTokens: 120000

modelSpecs:
  enforce: true
  list:
    - name: "ostoG-Base"
      label: "ostoG Base"
      preset:
        endpoint: "agents"
        agent_id: "agent_ByXtqSXvxsmOMcuZYtMop"
    - name: "ostoG-Pro"
      label: "ostoG Pro"
      preset:
        endpoint: "agents"
        agent_id: "agent_3qHOpaO1VJjBcxVHsfs1W"
    - name: "ostoG-Ultra"
      label: "ostoG Ultra"
      preset:
        endpoint: "agents"
        agent_id: "agent_29J_rNUVyf4x1Iua8SlB5"
